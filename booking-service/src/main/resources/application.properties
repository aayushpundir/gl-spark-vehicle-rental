spring.application.name=booking-service
server.port=8083

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/booking_db
spring.datasource.username=postgres
spring.datasource.password=Ayush@123
spring.jpa.hibernate.ddl-auto=update

# Ensure Hibernate uses the correct Postgres dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Show detailed security and web errors
logging.level.org.springframework.web=DEBUG

# Show every Feign request and response
logging.level.com.globallogic.vrs.booking_service.client=DEBUG
feign.client.config.default.loggerLevel=full

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE
server.error.include-stacktrace=always
server.error.include-message=always

eureka.instance.prefer-ip-address=true
# Also add this to ensure the Gateway can "see" the IP
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Eureka & JWT (Same as before)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
